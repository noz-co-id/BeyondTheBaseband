<svg width="1100" height="300" viewBox="0 0 1100 300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .box { fill:#0b132b; stroke:#5bc0be; stroke-width:2; rx:10; }
    .text { fill:#e0fbfc; font-family:monospace; font-size:14px; }
    .title { fill:#ffffff; font-size:16px; font-weight:bold; }
    .arrow { stroke:#ffffff; stroke-width:2; marker-end:url(#arrowhead); }
  </style>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" 
            refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="350" y="30" class="title">Cross-Generation Attack Chain (6G NTN → 2G)</text>

  <!-- 6G NTN -->
  <rect x="40" y="120" width="150" height="90" class="box"/>
  <text x="55" y="145" class="text">6G NTN</text>
  <text x="55" y="165" class="text">Non-Terrestrial</text>
  <text x="55" y="185" class="text">AI-Native Layer</text>

  <!-- 5G SA -->
  <rect x="210" y="120" width="150" height="90" class="box"/>
  <text x="225" y="145" class="text">5G SA</text>
  <text x="225" y="165" class="text">5G Core (SBA)</text>
  <text x="225" y="185" class="text">API Surface</text>

  <!-- 5G NSA -->
  <rect x="380" y="120" width="150" height="90" class="box"/>
  <text x="395" y="145" class="text">5G NSA</text>
  <text x="395" y="165" class="text">NR Signaling</text>
  <text x="395" y="185" class="text">EN-DC</text>

  <!-- 4G LTE -->
  <rect x="550" y="120" width="150" height="90" class="box"/>
  <text x="565" y="145" class="text">4G LTE</text>
  <text x="565" y="165" class="text">RRC / NAS</text>
  <text x="565" y="185" class="text">Anchor Layer</text>

  <!-- 3G UMTS -->
  <rect x="720" y="120" width="150" height="90" class="box"/>
  <text x="735" y="145" class="text">3G UMTS</text>
  <text x="735" y="165" class="text">Fallback</text>
  <text x="735" y="185" class="text">Signaling Abuse</text>

  <!-- 2G GSM -->
  <rect x="890" y="120" width="150" height="90" class="box"/>
  <text x="905" y="145" class="text">2G GSM</text>
  <text x="905" y="165" class="text">No Mutual Auth</text>
  <text x="905" y="185" class="text">IMSI Exposure</text>

  <!-- Arrows -->
  <line x1="190" y1="165" x2="210" y2="165" class="arrow"/>
  <line x1="360" y1="165" x2="380" y2="165" class="arrow"/>
  <line x1="530" y1="165" x2="550" y2="165" class="arrow"/>
  <line x1="700" y1="165" x2="720" y2="165" class="arrow"/>
  <line x1="870" y1="165" x2="890" y2="165" class="arrow"/>

</svg>
